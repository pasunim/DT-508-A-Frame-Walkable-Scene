<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>A-Frame Walkable Scene</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <style>
        body {
            background-color: #f5f6f8;
        }

        .scene-card {
            overflow: hidden;
        }

        .scene-card a-scene {
            display: block;
            width: 100%;
            height: 70vh;
        }

        #webcam-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #canvas {
            width: 100%;
            max-width: 260px;
            height: auto;
            border-radius: 0.5rem;
            border: 1px solid #dee2e6;
        }

        #label-container div {
            display: flex;
            justify-content: space-between;
            padding: 0.35rem 0.75rem;
            border-radius: 0.375rem;
            background-color: #f8f9fa;
            margin-bottom: 0.35rem;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">A-Frame Walkable Scene</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card shadow-sm scene-card">
                    <div class="card-body p-0">
                        <a-scene embedded>
                            <a-assets>
                                <a-asset-item id="event" src="monza_circuit_1998_layout.glb"></a-asset-item>
                            </a-assets>
                            <a-entity gltf-model="#event" scale="1 1 1" position="0 0 0" rotation="0 90 0"
                                fix-materials></a-entity>
                            <a-entity camera look-controls wasd-controls position="0 5 0" rotation="0 0 0">
                                <a-cursor color="black"></a-cursor>
                            </a-entity>
                            <a-light type="ambient" color="#ffffff" intensity="1"></a-light>
                            <a-light type="directional" color="#ffffff" intensity="0.3" position="1 1 1"></a-light>
                        </a-scene>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title mb-3">Pose Control</h5>
                        <button type="button" class="btn btn-primary btn-lg w-100 mb-3" onclick="init()">
                            Start
                        </button>
                        <div id="webcam-wrapper" class="mb-3">
                            <canvas id="canvas"></canvas>
                        </div>
                        <div id="label-container" class="text-start"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>

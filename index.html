<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>A-Frame Walkable Scene</title>
    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
</head>

<body>
    <div style="width:60%; height:80vh; margin: 0 auto; float: left;">
        <a-scene embedded>
            <a-assets>
                <a-asset-item id="event" src="monza_circuit_1998_layout.glb"></a-asset-item>
            </a-assets>
            <a-entity gltf-model="#event" scale="1 1 1" position="0 0 0" rotation="0 90 0" fix-materials></a-entity>
            <a-entity camera look-controls wasd-controls position="0 5 0" rotation="0 0 0">
                <a-cursor color="black"></a-cursor>
            </a-entity>
            <a-light type="ambient" color="#ffffff" intensity="1"></a-light>
            <a-light type="directional" color="#ffffff" intensity="0.3" position="1 1 1"></a-light>
        </a-scene>
    </div>
    <div style="width:40%; height:80vh; margin: 0 auto; float: right;">
        <button type="button" onclick="init()">Start</button>
        <div><canvas id="canvas"></canvas></div>
        <div id="label-container"></div>
    </div>
    <script src="app.js"></script>
</body>

</html>
